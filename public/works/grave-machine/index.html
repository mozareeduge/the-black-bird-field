<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Grave-Machine / گور-ماشین</title>
<style>
@font-face{
  font-family:"Estedad";
  src:url("https://cdn.jsdelivr.net/gh/aminabedi68/Estedad@master/fonts/webfonts/Estedad%5Bwght%5D.woff2") format("woff2");
  font-style:normal;
  font-weight:100 900;
  font-display:swap;
}
:root{
  --bg:#000;
  --panel:#020202;
  --fg:#f4f1eb;
  --muted:#8b857d;
  --muted2:#69635c;
  --line:#191715;
  --mono:"IBM Plex Mono","PT Mono","Courier Prime",Consolas,monospace;
  --fa:"Estedad","Noto Sans Arabic",Tahoma,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;background:#000;color:var(--fg);overflow:hidden}
body{font-family:var(--mono);text-rendering:geometricPrecision}
button,a{font:inherit}
a{color:inherit;text-decoration:none;border-block-end:1px solid #48423c}
a:hover,a:focus-visible{color:#fff;border-block-end-color:#a49c91;outline:none}
#app{
  height:100vh;
  height:100dvh;
  display:grid;
  grid-template-rows:auto minmax(0,1fr);
  background:#000;
}
.identity{
  min-height:150px;
  padding:22px 30px 19px;
  border-block-end:1px solid var(--line);
  display:grid;
  align-items:start;
  column-gap:32px;
  row-gap:7px;
}
.identity.en{
  grid-template-columns:minmax(0,1fr) auto;
  grid-template-areas:
    "name lineage"
    "nav lineage";
}
.identity.fa{
  direction:ltr;
  grid-template-columns:auto minmax(0,1fr);
  grid-template-areas:
    "lineage name"
    "lineage nav";
}
.identity-name{grid-area:name}
.identity-nav{
  grid-area:nav;
  display:flex;
  align-items:center;
  gap:22px;
  margin-block-start:15px;
}
.identity-lineage{
  grid-area:lineage;
  color:var(--muted);
  font-size:10.5px;
  line-height:1.5;
}
.identity.en .identity-lineage{text-align:end}
.identity.fa .identity-name,
.identity.fa .identity-nav{
  direction:rtl;
  text-align:start;
  justify-self:end;
}
.identity.fa .identity-lineage{
  direction:rtl;
  text-align:start;
  font-family:var(--fa);
  letter-spacing:0;
}
.title-en{
  font-size:23px;
  line-height:1;
  letter-spacing:.075em;
  font-weight:600;
}
.title-fa{
  font-family:var(--fa);
  font-size:31px;
  line-height:1.32;
  font-weight:720;
  letter-spacing:0;
}
.credit-en{
  margin-block-start:11px;
  color:#d8d3cb;
  font-size:11.5px;
  letter-spacing:.05em;
}
.credit-fa{
  margin-block-start:4px;
  font-family:var(--fa);
  font-size:12.5px;
  line-height:1.75;
  font-weight:430;
  letter-spacing:0;
}
.text-control{
  appearance:none;
  border:0;
  border-block-end:1px solid #3d3833;
  background:transparent;
  color:#cbc4ba;
  padding:0 0 2px;
  cursor:pointer;
  line-height:1.25;
}
.text-control:hover,.text-control:focus-visible{
  color:#fff;
  border-block-end-color:#aaa198;
  outline:none;
}
.fa-text{font-family:var(--fa);letter-spacing:0}
#field{
  min-height:0;
  display:grid;
  grid-template-columns:minmax(320px,38%) minmax(0,62%);
  grid-template-areas:"runtime surface";
  direction:ltr;
}
.pane{
  position:relative;
  min-height:0;
  overflow:hidden;
  padding:27px 30px;
}
.runtime{
  grid-area:runtime;
  background:var(--panel);
  border-inline-end:1px solid var(--line);
  color:#b7b0a7;
  direction:ltr;
  text-align:left;
}
.surface{
  grid-area:surface;
  background:#000;
  padding-inline-start:38px;
}
.pane-title{
  margin:0;
  color:#777169;
  font-size:10px;
  line-height:1;
  letter-spacing:.16em;
  text-transform:uppercase;
}
.stream{
  position:absolute;
  inset-block:59px 24px;
  inset-inline:30px;
  overflow:hidden;
}
.surface .stream{inset-inline-start:38px}
.surface.en{
  direction:ltr;
  text-align:left;
  font-family:var(--mono);
  font-size:20px;
  line-height:1.62;
  letter-spacing:-.025em;
}
.surface.fa{
  direction:rtl;
  text-align:start;
  font-family:var(--fa);
  font-size:18.5px;
  line-height:1.84;
  font-weight:450;
  letter-spacing:0;
}
.poem-line{
  min-height:1.6em;
  margin-block-end:15px;
  white-space:pre-wrap;
  overflow-wrap:anywhere;
  color:#f6f2eb;
}
.receipt{
  display:grid;
  row-gap:5px;
  font-size:11.2px;
  line-height:1.36;
  letter-spacing:-.01em;
}
.receipt-row{
  display:grid;
  grid-template-columns:52px minmax(0,1fr);
  gap:8px;
  align-items:start;
}
.receipt-label{color:#777169}
.receipt-value{
  color:#bdb6ad;
  min-width:0;
  overflow-wrap:anywhere;
  unicode-bidi:plaintext;
}
.statement-layer{
  position:fixed;
  inset:0;
  z-index:20;
  display:grid;
  place-items:center;
  padding:24px;
  background:rgba(0,0,0,.84);
}
.statement-layer[hidden]{display:none}
.statement-card{
  width:min(760px,100%);
  max-height:min(76vh,760px);
  overflow:auto;
  border:1px solid #292620;
  background:#030303;
  padding:29px 31px 33px;
}
.statement-card.en{
  font-family:var(--mono);
  font-size:14px;
  line-height:1.76;
}
.statement-card.fa{
  direction:rtl;
  text-align:start;
  font-family:var(--fa);
  font-size:16px;
  line-height:1.95;
  font-weight:410;
  letter-spacing:0;
}
.statement-close{
  display:block;
  margin-inline-start:auto;
  margin-block-end:22px;
}
@media(max-width:760px){
  .identity{
    min-height:132px;
    padding:16px 18px 14px;
    display:grid;
    grid-template-columns:1fr!important;
    grid-template-areas:"name" "lineage" "nav"!important;
    row-gap:5px;
  }
  .identity.fa .identity-name,
  .identity.fa .identity-nav{justify-self:end}
  .identity.en .identity-lineage,
  .identity.fa .identity-lineage{text-align:start}
  .identity-nav{margin-block-start:8px;gap:18px}
  .title-en{font-size:21px}
  .title-fa{font-size:28px}
  #field{
    grid-template-columns:1fr;
    grid-template-rows:minmax(128px,30%) minmax(0,70%);
    grid-template-areas:"runtime" "surface";
  }
  .runtime{
    border-inline-end:0;
    border-block-end:1px solid var(--line);
    padding:15px 18px;
  }
  .surface{padding:17px}
  .stream{inset-block:43px 12px;inset-inline:18px}
  .surface .stream{inset-inline:18px}
  .receipt{font-size:9.8px;row-gap:3px}
  .receipt-row{grid-template-columns:46px minmax(0,1fr);gap:6px}
  .surface.en{font-size:17px;line-height:1.56}
  .surface.fa{font-size:16.5px;line-height:1.78}
  .poem-line{margin-block-end:10px}
  .statement-layer{padding:13px}
  .statement-card{padding:21px 19px 25px}
  .statement-card.fa{font-size:15px}
}
@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important}}
</style>
</head>
<body>
<div id="app">
  <header id="identity" class="identity en">
    <div class="identity-name">
      <div id="title" class="title-en">Grave-Machine</div>
      <div id="credit" class="credit-en">By Mozare</div>
    </div>

    <div id="lineage" class="identity-lineage">
      An Iranian Remix of<br>
      <a id="sourceLink" href="https://collection.eliterature.org/3/works/taroko-gorge/taroko-gorge.html"
         target="_blank" rel="noopener noreferrer"><bdi dir="ltr" lang="en">Taroko Gorge</bdi></a>
    </div>

    <nav class="identity-nav" aria-label="Work controls">
      <button id="languageSwitch" class="text-control fa-text" type="button" lang="fa">فارسی</button>
      <button id="statementOpen" class="text-control" type="button">statement</button>
    </nav>
  </header>

  <main id="field">
    <section class="pane runtime" aria-label="Runtime field">
      <p class="pane-title">Runtime Field</p>
      <div id="runtimeStream" class="stream"></div>
    </section>

    <section id="surfacePane" class="pane surface en" aria-label="Generated surface">
      <p id="surfaceTitle" class="pane-title">Generated Surface</p>
      <div id="surfaceStream" class="stream"></div>
    </section>
  </main>
</div>

<section id="statementLayer" class="statement-layer" hidden role="dialog" aria-modal="true">
  <div id="statementCard" class="statement-card en">
    <button id="statementClose" class="text-control statement-close" type="button">close</button>
    <div id="statementText"></div>
  </div>
</section>

  bury:"buries",lose:"loses",misread:"misreads",pass:"passes",
  press:"presses",cross:"crosses"
};

function weighted(items){
  const usable=(items||[]).filter(x=>Number(x.weight??x.chance??0)>0);
  const total=usable.reduce((n,x)=>n+Number(x.weight??x.chance??0),0);
  let r=Math.random()*total;
  for(const item of usable){
    r-=Number(item.weight??item.chance??0);
    if(r<=0)return item;
  }
  return usable[0]||null;
}
function pluralEnglish(word){
  const low=String(word||"").toLowerCase();
  if(SPECIAL_PLURAL[low])return SPECIAL_PLURAL[low];
  if(IRREGULAR_PLURAL[low])return IRREGULAR_PLURAL[low];
  if(low.endsWith("s"))return low;
  if(/[^aeiou]y$/.test(low))return low.slice(0,-1)+"ies";
  if(/(s|x|z|ch|sh)$/.test(low))return low+"es";
  return low+"s";
}
function thirdEnglish(word){
  const low=String(word||"").toLowerCase();
  if(IRREGULAR_V3[low])return IRREGULAR_V3[low];
  if(/[^aeiou]y$/.test(low))return low.slice(0,-1)+"ies";
  if(/(s|x|z|ch|sh|o)$/.test(low))return low+"es";
  return low+"s";
}
function renderForm(project,token,key){
  if(!token)return "";
  const form=key||"literal";
  const override=project.forms?.overrides?.[token.id]?.[form];
  if(override)return override;
  if(token.lockedLiteral&&!["uppercase","lowercase"].includes(form))return token.literal;
  if(form==="literal"||form==="base")return token.literal;
  if(project.project.language==="en"){
    if(form==="plural")return pluralEnglish(token.literal);
    if(form==="thirdSingular")return thirdEnglish(token.literal);
  }
  return token.literal;
}
function cleanLine(value){
  return String(value||"")
    .replace(/\s+([.,;:!?،؛؟])/g,"$1")
    .replace(/\s{2,}/g," ")
    .trim();
}
function pushBounded(list,value,max){
  list.push(value);
  while(list.length>max)list.shift();
}
function chooseToken(state,bankId){
  const bank=state.project.materials.trays[bankId]||[];
  const recent=state.recentTokens[bankId]||[];
  const candidates=bank.filter(t=>!recent.includes(t.literal));
  const token=weighted(candidates.length?candidates:bank);
  state.recentTokens[bankId]=recent;
  pushBounded(state.recentTokens[bankId],token.literal,4);
  return token;
}
function deviceById(project,id){return project.lineDevices.find(d=>d.id===id)}
function slotsForFlow(project,flow){
  const stanza=project.stanzaPatterns.find(s=>s.id===flow.stanzaId);
  return stanza?.slots||[];
}
function refillQueue(state){
  const flow=weighted(state.project.flowScenes);
  state.queue=slotsForFlow(state.project,flow).map(slot=>({...slot,flowId:flow.id}));
}
function chooseRoute(state,device){
  let candidates=device.routes.filter(r=>!state.recentRoutes.includes(r.id));
  const shapes=state.recentShapes.slice(-2);
  if(shapes.length===2&&shapes[0]==="svo"&&shapes[1]==="svo"){
    const nonSvo=candidates.filter(r=>(r.shape||"svo")!=="svo");
    if(nonSvo.length)candidates=nonSvo;
  }
  return weighted(candidates.length?candidates:device.routes);
}
function badSurface(code,surface,selected){
  const literals=Object.values(selected).map(t=>t.literal);
  if(new Set(literals).size!==literals.length)return true;

  const s=surface.toLowerCase();
  const shared=[
    "dead soldier","poet","testimony","camera","computer","recording device",
    "bandage","wash","gold","paper-bodies","binder-bodies"
  ];
  if(shared.some(x=>s.includes(x)))return true;

  if(code==="en"){
    return [
      "turn intoes","pass intoes","file ases","a unclaimed",
      "stamp stamps","fallen leaves falls","fallen leaves slides"
    ].some(x=>s.includes(x));
  }
  return [
    "شاعر","سرباز مرده","دوربین","کامپیوتر","باند",
    "نه کافی","داخل کف","داخل پیشخوان","دو جنازه‌ها",
    "دو پرونده‌ها","دو جعبه‌ها","دو فرم‌ها"
  ].some(x=>s.includes(x));
}
function buildLine(state,slot){
  const project=state.project;
  const device=deviceById(project,slot.deviceId);
  let route=null,selected=null,rendered=null,forms=null,surface="";

  for(let attempt=0;attempt<40;attempt++){
    route=chooseRoute(state,device);
    const used=[
      ...new Set(
        Array.from(route.template.matchAll(/\{([^}:]+):?[^}]*\}/g),m=>m[1])
      )
    ];
    selected={};
    rendered={};
    forms=[];
    const inputMap=Object.fromEntries(device.inputs.map(input=>[input.slot,input]));
    for(const name of used){
      const input=inputMap[name];
      selected[name]=chooseToken(state,input.tray);
    }
    surface=route.template.replace(/\{([^}:]+):?([^}]*)\}/g,(all,name,formName)=>{
      const token=selected[name];
      const out=renderForm(project,token,formName||"literal");
      rendered[name]=out;
      if(out!==token.literal)forms.push(`${token.literal} → ${out}`);
      return out;
    });
    surface=cleanLine(surface);
    const prefix=surface.split(/\s+/).slice(0,3).join(" ").toLowerCase();
    if(
      !state.recentLines.includes(surface)&&
      !state.recentPrefixes.includes(prefix)&&
      !badSurface(project.project.language,surface,selected)
    ){
      pushBounded(state.recentRoutes,route.id,8);
      pushBounded(state.recentPrefixes,prefix,10);
      pushBounded(state.recentLines,surface,30);
      pushBounded(state.recentShapes,route.shape||"svo",3);
      break;
    }
  }
  return {
    type:"line",
    tick:state.tick,
    flowId:slot.flowId,
    deviceId:device.id,
    deviceName:device.name,
    routeId:route.id,
    routeName:route.name,
    routeTemplate:route.template,
    selected,
    rendered,
    forms,
    surface
  };
}
function nextEvent(code){
  const state=states[code];
  state.tick+=1;
  if(!state.queue.length)refillQueue(state);
  const slot=state.queue.shift();
  const event=slot.type==="breath"
    ?{type:"breath",tick:state.tick,flowId:slot.flowId,surface:""}
    :buildLine(state,slot);
  state.history.unshift(event);
  state.history=state.history.slice(0,120);
  return event;
}
function makeReceiptRow(label,value){
  const row=document.createElement("div");
  row.className="receipt-row";
  const a=document.createElement("span");
  a.className="receipt-label";
  a.textContent=label;
  const b=document.createElement("bdi");
  b.className="receipt-value";
  b.dir="auto";
  b.textContent=value;
  row.append(a,b);
  return row;
}
function renderReceipt(event){
  const root=document.createElement("div");
  root.className="receipt";
  if(!event)return root;
  root.append(makeReceiptRow("event",String(event.tick).padStart(4,"0")));
  root.append(makeReceiptRow("flow",event.flowId||""));
  if(event.type==="breath"){
    root.append(makeReceiptRow("print","—"));
    return root;
  }
  root.append(makeReceiptRow("device",`${event.deviceId} / ${event.routeId}`));
  root.append(makeReceiptRow("model",event.routeTemplate));
  const picks=Object.entries(event.selected)
    .map(([slot,token])=>`${slot}=${event.rendered[slot]||token.literal}`)
    .join(" | ");
  root.append(makeReceiptRow("pick",picks||"none"));
  root.append(makeReceiptRow("form",event.forms.length?event.forms.join(" | "):"none"));
  root.append(makeReceiptRow("print",event.surface));
  return root;
}
function render(){
  const state=states[lang];
  const mobile=matchMedia("(max-width:760px)").matches;
  const cap=mobile?6:8;
  $("runtimeStream").replaceChildren(renderReceipt(state.history[0]));
  const fragment=document.createDocumentFragment();
  for(const event of state.history.slice(0,cap)){
    const line=document.createElement("div");
    line.className="poem-line";
    line.lang=lang;
    line.dir=lang==="fa"?"rtl":"ltr";
    line.textContent=event.type==="breath"?"":event.surface;
    fragment.appendChild(line);
  }
  $("surfaceStream").replaceChildren(fragment);
}
function setLanguage(code){
  lang=code;
  const project=states[code].project;
  const faMode=code==="fa";

  document.documentElement.lang=code;
  document.documentElement.dir=faMode?"rtl":"ltr";
  $("identity").className=`identity ${code}`;
  $("surfacePane").className=`pane surface ${code}`;
  $("statementCard").className=`statement-card ${code}`;

  $("title").className=faMode?"title-fa":"title-en";
  $("title").textContent=project.project.title;
  $("credit").className=faMode?"credit-fa":"credit-en";
  $("credit").textContent=faMode?"کاری از مضارع":"By Mozare";

  $("lineage").innerHTML=faMode
    ?'یک ریمیکس ایرانی از<br><a href="'+project.project.sourceUrl+'" target="_blank" rel="noopener noreferrer"><bdi dir="ltr" lang="en">Taroko Gorge</bdi></a>'
    :'An Iranian Remix of<br><a href="'+project.project.sourceUrl+'" target="_blank" rel="noopener noreferrer"><bdi dir="ltr" lang="en">Taroko Gorge</bdi></a>';

  $("languageSwitch").textContent=faMode?"English":"فارسی";
  $("languageSwitch").lang=faMode?"en":"fa";
  $("languageSwitch").className=faMode?"text-control":"text-control fa-text";

  $("statementOpen").textContent=faMode?"درباره‌ی اثر":"statement";
  $("statementOpen").className=faMode?"text-control fa-text":"text-control";
  $("statementClose").textContent=faMode?"بستن":"close";
  $("statementClose").className=faMode
    ?"text-control statement-close fa-text"
    :"text-control statement-close";

  $("surfaceTitle").textContent=faMode?"سطح مولد":"Generated Surface";
  $("statementText").textContent=project.project.statement;
  render();
}
function frame(timestamp){
  const state=states[lang];
  if(!state.lastTime)state.lastTime=timestamp;
  const delta=Math.min(timestamp-state.lastTime,250);
  state.lastTime=timestamp;
  state.accumulator+=delta;
  const interval=Number(state.project.surface.speedMs||2700);
  if(state.accumulator>=interval){
    state.accumulator%=interval;
    nextEvent(lang);
    render();
  }
  requestAnimationFrame(frame);
}
$("languageSwitch").addEventListener("click",()=>setLanguage(lang==="en"?"fa":"en"));
$("statementOpen").addEventListener("click",()=>{
  $("statementLayer").hidden=false;
  $("statementClose").focus();
});
$("statementClose").addEventListener("click",()=>{
  $("statementLayer").hidden=true;
  $("statementOpen").focus();
});
$("statementLayer").addEventListener("click",event=>{
  if(event.target===$("statementLayer"))$("statementClose").click();
});
document.addEventListener("keydown",event=>{
  if(event.key==="Escape"&&!$("statementLayer").hidden)$("statementClose").click();
});
window.addEventListener("resize",render,{passive:true});

setLanguage("en");
requestAnimationFrame(frame);
</script>
